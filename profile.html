<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeonSync - Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="./main.css" />
    <style>
      .profile-header-card {
        background: var(--bg-panel);
        border: 1px solid var(--border-glass);
        border-radius: var(--radius-lg);
        padding: 28px;
        display: flex;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 24px;
        backdrop-filter: blur(12px);
        flex-wrap: wrap;
      }
      .profile-stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }
      .heatmap-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
      }
      .heatmap-cell {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.04);
        transition: background 0.2s;
      }
      .heatmap-cell:hover {
        outline: 1px solid var(--cyan);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-text">Loading profile...</span>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Mobile top bar -->
    <div class="mobile-topbar" id="mobile-topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">
        <i class="ph ph-list"></i>
      </button>
      <div class="mobile-logo">
        <div class="mobile-logo-icon"><i class="ph ph-circles-four"></i></div>
        <span class="mobile-logo-text">NeonSync</span>
      </div>
      <div style="width:36px"></div>
    </div>

    <div class="app-layout" id="app">
      <div id="sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Profile</h1>
            <p class="page-subtitle">User details &amp; activity</p>
          </div>
          <a href="dashboard.html" class="btn btn-secondary">
            <i class="ph ph-arrow-left"></i> Back
          </a>
        </div>

        <!-- Profile header — filled by profile.js -->
        <div class="profile-header-card">
          <div
            id="profile-header-inner"
            style="
              display: flex;
              align-items: flex-start;
              gap: 20px;
              flex: 1;
              flex-wrap: wrap;
            "
          ></div>
        </div>

        <!-- Stats -->
        <div class="profile-stats-row">
          <div class="stat-card animate-in">
            <div class="stat-icon green">
              <i class="ph ph-check-circle"></i>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-completed">—</div>
              <div class="stat-label">Completed</div>
            </div>
          </div>
          <div class="stat-card animate-in" style="animation-delay: 0.05s">
            <div class="stat-icon cyan">
              <i class="ph ph-arrows-clockwise"></i>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-active">—</div>
              <div class="stat-label">Active Tasks</div>
            </div>
          </div>
          <div class="stat-card animate-in" style="animation-delay: 0.1s">
            <div class="stat-icon purple"><i class="ph ph-percent"></i></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-rate">—</div>
              <div class="stat-label">Completion Rate</div>
            </div>
          </div>
          <div class="stat-card animate-in" style="animation-delay: 0.15s">
            <div class="stat-icon warning"><i class="ph ph-clock"></i></div>
            <div class="stat-info">
              <div
                class="stat-value"
                id="stat-last-active"
                style="font-size: 15px"
              >
                —
              </div>
              <div class="stat-label">Last Active</div>
            </div>
          </div>
        </div>

        <!-- Heatmap -->
        <div class="card mb-6 animate-in" style="animation-delay: 0.2s">
          <div class="section-header">
            <span class="section-title">Activity Heatmap</span>
            <span class="text-sm text-muted">Last 12 weeks</span>
          </div>
          <div id="heatmap-grid" class="heatmap-grid"></div>
        </div>

        <!-- Timeline + Remarks -->
        <div class="grid-2 mb-6">
          <div class="card animate-in" style="animation-delay: 0.25s">
            <div class="section-header">
              <span class="section-title">Task Timeline</span>
            </div>
            <div id="task-timeline">
              <div class="empty-state">
                <i class="ph ph-list-checks"></i>
                <p>No task history yet</p>
              </div>
            </div>
          </div>
          <div class="card animate-in" style="animation-delay: 0.3s">
            <div class="section-header">
              <span class="section-title">Recent Remarks</span>
            </div>
            <div id="recent-remarks">
              <div class="empty-state">
                <i class="ph ph-chat-circle-dots"></i>
                <p>No remarks yet</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-profile-modal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Edit Profile</span>
          <button
            class="modal-close"
            onclick="closeModal('edit-profile-modal')"
          >
            <i class="ph ph-x"></i>
          </button>
        </div>
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input
            type="text"
            id="ep-name"
            class="form-input"
            placeholder="Your name"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea
            id="ep-bio"
            class="form-input"
            rows="3"
            placeholder="A short bio..."
          ></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Skills (comma separated)</label>
          <input
            type="text"
            id="ep-skills"
            class="form-input"
            placeholder="JavaScript, React, Firebase"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Photo URL</label>
          <input
            type="text"
            id="ep-photo"
            class="form-input"
            placeholder="https://..."
          />
        </div>
        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
          "
        >
          <button
            class="btn btn-secondary"
            onclick="closeModal('edit-profile-modal')"
          >
            Cancel
          </button>
          <button class="btn btn-primary" id="ep-save" onclick="saveProfile()">
            <i class="ph ph-check"></i> Save Changes
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="./profile.js"></script>
  
    <!-- Mobile sidebar toggle -->
    <script>
      (function() {
        function openSidebar() {
          var sb = document.getElementById('sidebar');
          var overlay = document.getElementById('sidebar-overlay');
          if (sb) sb.classList.add('open');
          if (overlay) overlay.classList.add('active');
          document.body.classList.add('no-scroll');
        }
        function closeSidebar() {
          var sb = document.getElementById('sidebar');
          var overlay = document.getElementById('sidebar-overlay');
          if (sb) sb.classList.remove('open');
          if (overlay) overlay.classList.remove('active');
          document.body.classList.remove('no-scroll');
        }
        document.addEventListener('DOMContentLoaded', function() {
          var btn = document.getElementById('mobile-menu-btn');
          var overlay = document.getElementById('sidebar-overlay');
          var closeBtn = document.getElementById('sidebar-close-btn');
          if (btn) btn.addEventListener('click', openSidebar);
          if (overlay) overlay.addEventListener('click', closeSidebar);
          if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
          // Close sidebar when nav links are clicked on mobile
          document.querySelectorAll('.sidebar-nav-item').forEach(function(link) {
            link.addEventListener('click', closeSidebar);
          });
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') closeSidebar();
        });
      })();
    </script>

  </body>
</html>
