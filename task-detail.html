<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeonSync - Task Detail</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-text">Loading task...</span>
    </div>

    <div class="app-layout" id="app">
      <div id="sidebar"></div>

      <main class="main-content">
        ```
        <div class="page-header">
          <div style="display: flex; align-items: center; gap: 12px">
            <a href="tasks.html" class="btn btn-secondary btn-sm">
              <i class="ph ph-arrow-left"></i> Back
            </a>

            <div>
              <h1
                class="page-title"
                id="task-title-display"
                data-testid="task-title-display"
              >
                Loading...
              </h1>
              <p class="page-subtitle" id="task-meta-display"></p>
            </div>
          </div>

          <div style="display: flex; gap: 8px" id="task-action-btns">
            <button
              class="btn btn-secondary btn-sm"
              id="edit-task-btn"
              onclick="openEditModal()"
              style="display: none"
            >
              <i class="ph ph-pencil"></i> Edit
            </button>

            <button
              class="btn btn-danger btn-sm"
              id="delete-task-btn"
              onclick="deleteTask()"
              style="display: none"
            >
              <i class="ph ph-trash"></i> Delete
            </button>
          </div>
        </div>

        <div class="task-detail-grid">
          <!-- LEFT SIDE -->

          <div>
            <!-- TASK INFO -->

            <div class="card mb-4 animate-in">
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 16px;
                  flex-wrap: wrap;
                  gap: 10px;
                "
              >
                <div
                  style="display: flex; gap: 8px; flex-wrap: wrap"
                  id="task-badges"
                ></div>

                <div
                  style="display: flex; align-items: center; gap: 10px"
                  id="status-controls"
                >
                  <label style="font-size: 12px; color: var(--text-secondary)"
                    >Status:</label
                  >

                  <select
                    id="status-select"
                    class="form-input form-select"
                    style="max-width: 160px; padding: 7px 32px 7px 10px"
                    onchange="updateStatus(this.value)"
                  >
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="review">Review</option>
                    <option value="completed">Completed</option>
                  </select>
                </div>
              </div>

              <p
                id="task-description"
                class="text-secondary mb-4"
                style="font-size: 14px; line-height: 1.6"
              ></p>

              <div class="grid-2 mb-4">
                <div>
                  <div class="text-sm text-muted mb-2">Created By</div>
                  <div id="task-creator"></div>
                </div>

                <div>
                  <div class="text-sm text-muted mb-2">Deadline</div>
                  <div id="task-deadline-display"></div>
                </div>
              </div>

              <div class="mb-4">
                <div class="text-sm text-muted mb-2">Assigned To</div>

                <div
                  id="task-assignees"
                  style="display: flex; gap: 8px; flex-wrap: wrap"
                ></div>
              </div>

              <div id="completion-control" style="display:none;">
                <div
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 8px;
                  "
                >
                  <div class="text-sm text-muted">Completion</div>
                  <span
                    id="completion-pct-label"
                    style="font-weight: 600; color: var(--accent-cyan)"
                  >
                    0%
                  </span>
                </div>

                <div class="progress-bar-wrap" style="height: 8px; margin-bottom:8px;">
                  <div
                    class="progress-bar-fill"
                    id="completion-bar"
                    style="width: 0%"
                  ></div>
                </div>

                <input
                  type="range"
                  id="completion-slider"
                  min="0" max="100" value="0"
                  style="width:100%;cursor:pointer;"
                  oninput="updateCompletionPreview(this.value)"
                  onchange="saveCompletion(this.value)"
                />
              </div>
            </div>

            <!-- TAGS -->
            <div id="tags-card" class="card mb-4 animate-in" style="display:none;">
              <div class="section-header">
                <span class="section-title">Tags</span>
              </div>
              <div id="task-tags-display" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
            </div>

            <!-- REMARKS -->

            <div class="card mb-4 animate-in">
              <div class="section-header">
                <span class="section-title">Remarks <span id="remarks-count" style="font-size:12px;color:var(--text-muted);font-weight:400;"></span></span>
              </div>

              <div id="remarks-list"></div>

              <div style="display: flex; gap: 10px; margin-top: 12px">
                <textarea
                  id="remark-text"
                  class="form-input"
                  placeholder="Add a remark..."
                  rows="2"
                  style="flex: 1"
                >
                </textarea>

                <button class="btn btn-primary btn-sm" onclick="addRemark()">
                  <i class="ph ph-paper-plane-tilt"></i>
                </button>
              </div>
            </div>

            <!-- ATTACHMENTS -->

            <div class="card animate-in">
              <div class="section-header">
                <span class="section-title">Attachments</span>
              </div>

              <div id="attachments-list" style="margin-bottom: 12px"></div>

              <div style="display: flex; gap: 8px; flex-wrap: wrap">
                <input
                  type="text"
                  id="attach-name"
                  class="form-input"
                  placeholder="File name"
                  style="flex: 1"
                />

                <input
                  type="url"
                  id="attach-url"
                  class="form-input"
                  placeholder="https://..."
                  style="flex: 2"
                />

                <button
                  class="btn btn-secondary btn-sm"
                  onclick="addAttachment()"
                >
                  <i class="ph ph-link"></i> Add
                </button>
              </div>
            </div>
          </div>

            <!-- ACTIVITY LOG -->
            <div class="card animate-in" style="margin-top:16px;">
              <div class="section-header">
                <span class="section-title">Activity Log</span>
              </div>
              <div id="task-logs"></div>
            </div>

          <!-- RIGHT SIDE CHAT -->

          <div>
            <div
              class="card animate-in"
              style="height: 420px; display: flex; flex-direction: column"
            >
              <div
                style="
                  padding: 16px;
                  border-bottom: 1px solid var(--border-glass);
                  font-weight: 600;
                "
              >
                <i class="ph ph-chat-circle-dots"></i> Task Discussion
              </div>

              <div
                id="task-messages"
                style="flex: 1; overflow-y: auto; padding: 14px"
              ></div>

              <div class="chat-input-area">
                <input
                  type="text"
                  id="task-chat-input"
                  class="chat-input"
                  placeholder="Write a message..."
                  onkeydown="if (event.key === 'Enter') sendTaskMessage();"
                />

                <button
                  class="btn btn-primary btn-sm"
                  onclick="sendTaskMessage()"
                >
                  <i class="ph ph-paper-plane-tilt"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>


    <!-- Edit Task Modal -->
    <div class="modal-overlay" id="edit-task-modal">
      <div class="modal" style="max-width:520px;">
        <div class="modal-header">
          <h3 class="modal-title">Edit Task</h3>
          <button class="modal-close" onclick="closeModal('edit-task-modal')">
            <i class="ph ph-x"></i>
          </button>
        </div>
        <form onsubmit="submitEditTask(event)">
          <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
            <div class="form-group">
              <label class="form-label">Title</label>
              <input id="edit-title" type="text" class="form-input" placeholder="Task title" required />
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <textarea id="edit-desc" class="form-input" rows="3" placeholder="Description..."></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div class="form-group">
                <label class="form-label">Priority</label>
                <select id="edit-priority" class="form-input form-select">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                  <option value="critical">Critical</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Deadline</label>
                <input id="edit-deadline" type="datetime-local" class="form-input" />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal('edit-task-modal')">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/js/task-detail.js"></script>
  </body>
</html>
