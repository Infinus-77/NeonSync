<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found · NeonSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <style>
      *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg-body: #f5f6fa;
        --blue: #4f6ef7;
        --purple: #8b5cf6;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-muted: #9ca3af;
        --border-glass: rgba(0,0,0,0.08);
        --gradient-brand: linear-gradient(135deg, #4f6ef7 0%, #8b5cf6 100%);
      }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg-body);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      body::before {
        content: "";
        position: fixed; inset: 0;
        background:
          radial-gradient(ellipse at 30% 40%, rgba(79,110,247,0.06) 0%, transparent 55%),
          radial-gradient(ellipse at 70% 60%, rgba(139,92,246,0.05) 0%, transparent 55%);
        pointer-events: none;
      }
      .container { position: relative; z-index: 1; max-width: 460px; }
      .code {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: clamp(80px, 20vw, 130px);
        font-weight: 900;
        line-height: 1;
        background: var(--gradient-brand);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }
      .icon { font-size: 48px; color: var(--text-muted); margin-bottom: 18px; display: block; opacity: 0.6; }
      h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
      p { color: var(--text-secondary); font-size: 14.5px; line-height: 1.65; margin-bottom: 28px; }
      .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      .btn {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 9px 20px; border-radius: 9px;
        font-size: 13.5px; font-weight: 600;
        text-decoration: none; transition: all 0.2s ease;
        cursor: pointer; border: none; font-family: 'Inter', sans-serif;
      }
      .btn-primary { background: var(--blue); color: white; box-shadow: 0 2px 10px rgba(79,110,247,0.25); }
      .btn-primary:hover { background: #3d5ce8; transform: translateY(-1px); }
      .btn-outline { background: #fff; border: 1px solid var(--border-glass); color: var(--text-secondary); }
      .btn-outline:hover { border-color: rgba(0,0,0,0.15); color: var(--text-primary); }
      .countdown { font-size: 12px; color: var(--text-muted); margin-top: 20px; }
      .countdown span { color: var(--blue); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <i class="ph ph-ghost icon"></i>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="actions">
        <a href="dashboard.html" class="btn btn-primary">
          <i class="ph ph-house"></i> Go to Dashboard
        </a>
        <a href="tasks.html" class="btn btn-outline">
          <i class="ph ph-check-square"></i> View Tasks
        </a>
      </div>
      <div class="countdown">Redirecting to dashboard in <span id="countdown">10</span>s</div>
    </div>
    <script>
      let n = 10;
      const el = document.getElementById("countdown");
      const interval = setInterval(() => {
        n--; el.textContent = n;
        if (n <= 0) { clearInterval(interval); window.location.href = "dashboard.html"; }
      }, 1000);
    </script>
  </body>
</html>
